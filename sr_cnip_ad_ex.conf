# Shadowrocket: 2026-04-11 14:46:58
[General]
include = sr_cnip_ad.conf
ipv6 = false

[Proxy Group]
Claude-Service = select,US-IP,REJECT,policy-select-name=US-IP
APNS = fallback,PROXY,DIRECT,url=http://www.gstatic.com/generate_204,interval=300

[Rule]
## — Claude - ##
# 1. 核心与内容域名（精准匹配优先级最高）
DOMAIN-SUFFIX,claude.ai,Claude-Service
DOMAIN-SUFFIX,anthropic.com,Claude-Service
DOMAIN-SUFFIX,anthropicusercontent.com,Claude-Service
DOMAIN-SUFFIX,siftscience.com,Claude-Service

# 2. User-Agent 兜底（优先级高于关键词兜底）
USER-AGENT,Claude*,Claude-Service
USER-AGENT,Anthropic*,Claude-Service

# 2. 关键词兜底 (相当于 *claude* 和 *anthropic*)
# 彻底防止 CLI 工具遗漏的 API 调用、静态资源或新出的子域名走错节点
DOMAIN-KEYWORD,claude,Claude-Service
DOMAIN-KEYWORD,anthropic,Claude-Service

## - QQ Media - ##
DOMAIN-SUFFIX,qq.com.cn,DIRECT

## - Figma - ##
# DOMAIN-SUFFIX,figma.com,DIRECT

## - Apple Music - ##
DOMAIN-SUFFIX,audio.itunes.apple.com,DIRECT
DOMAIN-SUFFIX,play.itunes.apple.com,DIRECT
DOMAIN-SUFFIX,streamingaudio.itunes.apple.com,DIRECT
DOMAIN-SUFFIX,aod.itunes.apple.com,DIRECT
# Optional
DOMAIN-KEYWORD,applemusic,DIRECT

## - Apple Apns - ##
DOMAIN-SUFFIX,push.apple.com,APNS
DOMAIN-SUFFIX,sandbox.push.apple.com,APNS
DOMAIN-SUFFIX,courier.push.apple.com,APNS
IP-CIDR,17.0.0.0/8,APNS,no-resolve

## - Steam DB - ##
DOMAIN-SUFFIX,steamdb.info,DIRECT

## - Vibe Island - ##
DOMAIN,edwluo.github.io,REJECT
DOMAIN,dl.vibeisland.app,REJECT
DOMAIN,vibeisland.app,REJECT
DOMAIN,updates.vibeisland.app,REJECT
DOMAIN,vibe-island-ls-relay.degrluo.workers.dev,REJECT
DOMAIN,api.vibeisland.app,REJECT
# Vibe Island telemetry
DOMAIN-SUFFIX,posthog.com,REJECT
DOMAIN-SUFFIX,sentry.io,REJECT

